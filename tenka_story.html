<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>天下統一奇譚</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    overflow-y: auto;

    background: url("bg_kitan.png") no-repeat center top;
    background-size: cover;
    background-color: black;
}

/* 6個ボタン配置 */
.stage-buttons {
    display: grid;

    /* PC */
    grid-template-columns: repeat(3, 200px);
    gap: 35px 45px;

    position: absolute;
    left: 50%;
    top: 55%;
    transform: translate(-50%, -50%);
}

/* ボタン */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
}

.imgbtn img {
    width: 200px;
    max-width: 100%;
    transition: transform 0.15s, filter 0.15s;
}

/* 左右下ボタン */
.home-fixed {
    position: fixed;
    bottom: 15px;
    left: 15px;
}

.back-fixed {
    position: fixed;
    bottom: 15px;
    right: 15px;
}

.home-fixed img,
.back-fixed img {
    width: 120px;
}

/* ホバー */
.imgbtn:hover img {
    transform: scale(1.05);
    filter:
        brightness(1.2)
        drop-shadow(0 0 6px rgba(255,255,200,0.9))
        drop-shadow(0 0 14px rgba(255,230,120,0.9))
        drop-shadow(0 0 24px rgba(255,200,80,0.8));
}

/* 押下 */
.imgbtn:active img {
    transform: scale(0.96);
    filter:
        brightness(1.35)
        drop-shadow(0 0 10px rgba(255,255,220,1))
        drop-shadow(0 0 22px rgba(255,230,120,1))
        drop-shadow(0 0 40px rgba(255,190,60,0.95));
}

/* ▼ スマホ対応 */
@media (max-width: 768px) {

    .stage-buttons {
        /* 2列に変更 */
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;

        width: 90%;
        top: 52%;
    }

    .imgbtn img {
        width: 100%; /* 自動縮小 */
    }

    .home-fixed img,
    .back-fixed img {
        width: 90px; /* 小さく */
    }
}
</style>
</head>

<body>

<div class="stage-buttons">

    <button class="imgbtn" onclick="location.href='okehazama.html'">
        <img src="okehazama.png">
    </button>

    <button class="imgbtn" onclick="location.href='fuji.html'">
        <img src="fuji_chikadouana.png">
    </button>

    <button class="imgbtn" onclick="location.href='kyouto.html'">
        <img src="kyoto.png">
    </button>

    <button class="imgbtn" onclick="location.href='shizugatake.html'">
        <img src="shizugatake.png">
    </button>

    <button class="imgbtn" onclick="location.href='hieizan.html'">
        <img src="hieizan.png">
    </button>

    <button class="imgbtn" onclick="location.href='nijoujou.html'">
        <img src="nijojo.png">
    </button>

</div>

<button class="imgbtn home-fixed" onclick="location.href='index.html'">
    <img src="kitan_top.png">
</button>

<button class="imgbtn back-fixed" onclick="location.href='counter.html'">
    <img src="kitanback.png">
</button>

</body>
</html>
