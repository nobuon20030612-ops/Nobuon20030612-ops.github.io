<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>天下統一奇譚</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: url("bg_kitan.png") no-repeat center top;
    background-size: 100% auto;
    background-color: black;
}

/* 6個ボタン配置 */
.stage-buttons {
    display: grid;
    grid-template-columns: repeat(3, 200px);
    gap: 35px 45px;

    position: fixed;
    left: 50%;
    top: 55%;
    transform: translate(-50%, -50%);
}

/* ボタン */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
}

.imgbtn img {
    width: 200px;
    transition: transform 0.15s, filter 0.15s;
}

/* 戻るボタン右下固定 */
.back-fixed {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.back-fixed img {
    width: 120px;
}

/* ホバー */
.imgbtn:hover img {
    transform: scale(1.05);
    filter:
        brightness(1.2)
        drop-shadow(0 0 6px rgba(255,255,200,0.9))
        drop-shadow(0 0 14px rgba(255,230,120,0.9))
        drop-shadow(0 0 24px rgba(255,200,80,0.8));
}

/* 押下 */
.imgbtn:active img,
.imgbtn.active img {
    transform: scale(0.96);
    filter:
        brightness(1.35)
        drop-shadow(0 0 10px rgba(255,255,220,1))
        drop-shadow(0 0 22px rgba(255,230,120,1))
        drop-shadow(0 0 40px rgba(255,190,60,0.95));
}
</style>
</head>

<body>

<div class="stage-buttons">

    <!-- 上段 -->
    <button class="imgbtn" onclick="location.href='okehazama.html'">
        <img src="okehazama.png" alt="桶狭間">
    </button>

    <button class="imgbtn" onclick="location.href='fuji_chikadouana.html'">
        <img src="fuji_chikadouana.png" alt="富士地下洞穴">
    </button>

    <button class="imgbtn" onclick="location.href='kyoto.html'">
        <img src="kyoto.png" alt="京都">
    </button>

    <!-- 下段 -->
    <button class="imgbtn" onclick="location.href='shizugatake.html'">
        <img src="shizugatake.png" alt="賤ヶ岳">
    </button>

    <button class="imgbtn" onclick="location.href='hieizan.html'">
        <img src="hieizan.png" alt="比叡山">
    </button>

    <button class="imgbtn" onclick="location.href='nijojo.html'">
        <img src="nijojo.png" alt="二条城">
    </button>

</div>

<!-- 戻る -->
<button class="imgbtn back-fixed" onclick="location.href='menu.html'">
    <img src="kitanback.png" alt="戻る">
</button>

</body>
</html>
