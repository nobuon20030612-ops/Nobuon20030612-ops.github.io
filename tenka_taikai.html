<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>天武技大会</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    overflow-y: auto;

    /* ▼ここを指定画像に変更 */
    background: url("bg_tenka_taikai.png") no-repeat center top;
    background-size: cover;

    background-color: black;
}

/* ▼ 2ボタン中央配置 */
.stage-buttons {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;

    position: absolute;
    left: 50%;
    top: 55%;
    transform: translate(-50%, -50%);
}

/* ボタン */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
}

.imgbtn img {
    width: 220px;
    max-width: 100%;
    transition: transform 0.15s, filter 0.15s;
}

/* 左下TOP */
.home-fixed {
    position: fixed;
    bottom: 15px;
    left: 15px;
}

/* 右下戻る */
.back-fixed {
    position: fixed;
    bottom: 15px;
    right: 15px;
}

.home-fixed img,
.back-fixed img {
    width: 120px;
}

/* ホバー */
.imgbtn:hover img {
    transform: scale(1.05);
    filter:
        brightness(1.2)
        drop-shadow(0 0 6px rgba(255,255,200,0.9))
        drop-shadow(0 0 14px rgba(255,230,120,0.9))
        drop-shadow(0 0 24px rgba(255,200,80,0.8));
}

/* 押下 */
.imgbtn:active img {
    transform: scale(0.96);
    filter:
        brightness(1.35)
        drop-shadow(0 0 10px rgba(255,255,220,1))
        drop-shadow(0 0 22px rgba(255,230,120,1))
        drop-shadow(0 0 40px rgba(255,190,60,0.95));
}

/* ▼ スマホ対応 */
@media (max-width: 768px) {

    .stage-buttons {
        flex-direction: column;
        gap: 25px;
        width: 80%;
        top: 52%;
    }

    .imgbtn img {
        width: 100%;
    }

    .home-fixed img,
    .back-fixed img {
        width: 90px;
    }
}
</style>
</head>

<body>

<div class="stage-buttons">

    <!-- 天 -->
    <button class="imgbtn" onclick="location.href='ten_mode.html'">
        <img src="ten.png" alt="天">
    </button>

    <!-- 地 -->
    <button class="imgbtn" onclick="location.href='chi_mode.html'">
        <img src="chi.png" alt="地">
    </button>

</div>

<!-- TOP -->
<button class="imgbtn home-fixed" onclick="location.href='index.html'">
    <img src="kitan_top.png">
</button>

<!-- 戻る -->
<button class="imgbtn back-fixed" onclick="location.href='counter.html'">
    <img src="okuni_kitanback.png">
</button>

</body>
</html>
