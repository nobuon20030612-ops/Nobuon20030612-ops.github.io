<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>天下武技大会・地</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    overflow-y: auto;

    background: url("bg_chi_mode.png") no-repeat center top;
    background-size: 90% auto;
    background-color: black;

    padding-bottom: 90px;
}

.imgbtn {
    position: fixed;
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
    z-index: 10;
}

.imgbtn img {
    width: 120px;
    transition: transform 0.15s, filter 0.15s;
}

.home-fixed {
    bottom: 2px;
    left: 5px;
}

.back-fixed {
    bottom: 2px;
    right: 5px;
}

.imgbtn:hover img {
    transform: scale(1.05);
    filter:
        brightness(1.2)
        drop-shadow(0 0 6px rgba(255,255,200,0.9))
        drop-shadow(0 0 14px rgba(255,230,120,0.9))
        drop-shadow(0 0 24px rgba(255,200,80,0.8));
}

.imgbtn:active img {
    transform: scale(0.96);
    filter:
        brightness(1.3)
        drop-shadow(0 0 10px rgba(255,255,220,1))
        drop-shadow(0 0 22px rgba(255,230,120,1))
        drop-shadow(0 0 40px rgba(255,190,60,0.95));
}
</style>
</head>

<body>

<button class="imgbtn home-fixed" onclick="location.href='index.html'">
    <img src="kitan_top.png" alt="TOPに戻る">
</button>

<button class="imgbtn back-fixed" onclick="location.href='tenka_taikai.html'">
    <img src="okuni_kitanback.png" alt="戻る">
</button>

</body>
</html>
