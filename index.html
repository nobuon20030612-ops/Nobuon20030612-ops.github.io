<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たいらの野望Online</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 3vh;
    background: url("bg.png") no-repeat center;
    background-size: cover;
    background-color: black;
}

/* ボタン共通 */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
}

/* 画像共通 */
.imgbtn img {
    width: 18vw;
    max-width: 240px;
    min-width: 120px;
    height: auto;
    display: block;
    transition: transform 0.15s ease, filter 0.15s ease, drop-shadow 0.15s ease;
}

/* 下段2つ */
.bottom {
    display: flex;
    gap: 5vw;
}

/* nopushだけ少し小さめ */
.nopush img {
    width: 14vw;
    max-width: 180px;
}

/* マウスを乗せたら光る */
.imgbtn:hover img {
    filter: brightness(1.18);
    transform: scale(1.04);
}

/* 押している間に強く光る */
.imgbtn:active img {
    filter:
        brightness(1.35)
        drop-shadow(0 0 8px rgba(255,255,180,0.95))
        drop-shadow(0 0 18px rgba(255,230,120,0.9))
        drop-shadow(0 0 30px rgba(255,210,80,0.75));
    transform: scale(0.98);
}

/* キーボード操作用 */
.imgbtn:focus-visible {
    outline: 2px solid rgba(255,255,200,0.9);
    outline-offset: 6px;
    border-radius: 12px;
}

/* スマホ */
@media (max-width: 600px) {
    .imgbtn img {
        width: 32vw;
        max-width: none;
    }

    .bottom .imgbtn img {
        width: 42vw;
    }

    .nopush img {
        width: 26vw;
    }
}
</style>
</head>

<body>

<!-- 上 -->
<button class="imgbtn" onclick="location.href='kashin.html'">
    <img src="kashin.png" alt="家臣計算機">
</button>

<!-- 中 -->
<div class="bottom">
    <button class="imgbtn" onclick="location.href='kishinseki.html'">
        <img src="kishinseki.png" alt="鬼神石">
    </button>

    <button class="imgbtn" onclick="location.href='tsukumogami.html'">
        <img src="tsukumogami.png" alt="九十九">
    </button>
</div>

<!-- 下 -->
<button class="imgbtn nopush" onclick="location.href='nopush.html'">
    <img src="nopush.png" alt="nopush">
</button>

</body>
</html>
