<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>九十九ツール・鬼神石・家臣計算機まとめ | 信長の野望オンライン攻略</title>

<meta name="description" content="信長の野望オンラインの九十九ツール・鬼神石計算・家臣計算機をまとめた攻略サイト。九十九の組み合わせや能力比較、最適構成を簡単に確認できます。">

<meta name="keywords" content="九十九,九十九ツール,鬼神石,鬼神石計算,家臣計算機,信長の野望オンライン">

</head>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 3vh;
    background: url("bg.png") no-repeat center;
    background-size: cover;
    background-color: black;
}

/* ボタン */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    -webkit-tap-highlight-color: transparent;
}

/* 画像 */
.imgbtn img {
    width: 16vw;
    max-width: 220px;
    min-width: 100px;
    display: block;
    transition: transform 0.15s ease, filter 0.15s ease;
}

/* ★中央3つ並び */
.middle {
    display: flex;
    gap: 4vw;
    align-items: center;
}

/* nopush */
.nopush img {
    width: 14vw;
    max-width: 180px;
}

/* YouTube少し大きめ */
.youtube img {
    width: 18vw;
    max-width: 260px;
}

/* 光る */
.imgbtn:hover img {
    transform: scale(1.05);
    filter:
        brightness(1.2)
        drop-shadow(0 0 6px rgba(255,255,200,0.9))
        drop-shadow(0 0 14px rgba(255,230,120,0.9))
        drop-shadow(0 0 24px rgba(255,200,80,0.8));
}

.imgbtn:active img,
.imgbtn.active img {
    transform: scale(0.96);
    filter:
        brightness(1.35)
        drop-shadow(0 0 10px rgba(255,255,220,1))
        drop-shadow(0 0 22px rgba(255,230,120,1))
        drop-shadow(0 0 40px rgba(255,190,60,0.95));
}

/* 動画 */
#videoOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#videoOverlay video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}

/* スマホ */
@media (max-width: 600px) {
    .imgbtn img {
        width: 28vw;
        max-width: none;
    }

    .middle .imgbtn img {
        width: 30vw;
    }

    .youtube img {
        width: 34vw;
    }

    .nopush img {
        width: 24vw;
    }
}
</style>
</head>

<body>
<h1 style="position:absolute; left:-9999px;">
信長の野望オンラインの攻略サイト
<h1 class="sr-only">信長の野望オンラインの攻略サイト</h1>

<p class="sr-only">
九十九・鬼神石・家臣計算機などをまとめた攻略サイト。
九十九と鬼神石の組み合わせ・家臣能力の計算を簡単に確認できます。
</p>

<div class="sr-only">
    <a href="tsukumogami.html">九十九ツール 組み合わせ一覧と最適構成</a><br>
    <a href="kishinseki.html">鬼神石ツール 計算と組み合わせ一覧</a><br>
    <a href="kashin.html">家臣計算機 家臣ステータス計算ツール</a>
</div>

<div class="middle">  
    <!-- 上 -->
<button class="imgbtn" onclick="location.href='kashin.html'">
    <img src="kashin.png" alt="家臣計算機　家臣のステータス計算ツール">
</button>

<!-- 中央3つ -->
<div class="middle">

    <button class="imgbtn" onclick="location.href='kishinseki.html'">
        <img src="kishinseki.png" alt="鬼神石の計算ツール　組み合わせと一覧">
    </button>

    <a href="https://www.youtube.com/@%E3%81%9F%E3%81%84%E3%82%89%E3%81%AEzzz"
       target="_blank"
       class="imgbtn youtube">
        <img src="youtube_btn.png" alt="youtube　たいらの　チャンネルリンク">
    </a>

    <button class="imgbtn" onclick="location.href='tsukumogami.html'">
        <img src="tsukumogami.png" alt="九十九の計算ツール　組み合わせと一覧">
    </button>

</div>

<!-- 下 -->
<button class="imgbtn nopush" onclick="playVideo()">
    <img src="nopush.png">
</button>

<!-- 動画 -->
<div id="videoOverlay">
    <video id="video" src="video.mp4"></video>
</div>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("videoOverlay");

function playVideo() {
    overlay.style.display = "flex";

    video.currentTime = 0;
    video.muted = false;
    video.play();

    if (video.requestFullscreen) {
        video.requestFullscreen();
    }
}

video.addEventListener("ended", () => {
    video.pause();
    overlay.style.display = "none";

    if (document.fullscreenElement) {
        document.exitFullscreen();
    }
});

/* スマホでも光る */
document.querySelectorAll('.imgbtn').forEach(btn => {
    btn.addEventListener('touchstart', () => {
        btn.classList.add('active');
    });

    btn.addEventListener('touchend', () => {
        setTimeout(() => {
            btn.classList.remove('active');
        }, 150);
    });
});
</script>

</body>
</html>
