<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たいらの野望Online</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 3vh;
    background: url("bg.png") no-repeat center;
    background-size: cover;
}

/* ボタン */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
}

.imgbtn img {
    width: 18vw;
    max-width: 240px;
    min-width: 120px;
    display: block;
}

/* 下段 */
.bottom {
    display: flex;
    gap: 5vw;
}

/* nopush */
.nopush img {
    width: 14vw;
}

/* 動画 */
#videoOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#videoOverlay video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>

<body>

<!-- 上 -->
<button class="imgbtn">
    <img src="kashin.png">
</button>

<!-- 中 -->
<div class="bottom">
    <button class="imgbtn">
        <img src="kishinseki.png">
    </button>
    <button class="imgbtn">
        <img src="tsukumogami.png">
    </button>
</div>

<!-- 下 -->
<button class="imgbtn nopush" onclick="playVideo()">
    <img src="nopush.png">
</button>

<!-- 動画 -->
<div id="videoOverlay">
    <video id="video" src="video.mp4"></video>
</div>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("videoOverlay");

function playVideo() {
    overlay.style.display = "flex";

    video.currentTime = 0;
    video.muted = false;
    video.play();

    if (video.requestFullscreen) {
        video.requestFullscreen();
    }
}

/* ★ここが追加（自動で戻る） */
video.addEventListener("ended", () => {
    video.pause();
    overlay.style.display = "none";

    if (document.fullscreenElement) {
        document.exitFullscreen();
    }
});
</script>

</body>
</html>
