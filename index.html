<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たいらの野望Online</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 3vh;
    background: url("bg.png") no-repeat center;
    background-size: cover;
    background-color: black;
}

/* ボタン */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    -webkit-tap-highlight-color: transparent;
}

/* 画像 */
.imgbtn img {
    width: 18vw;
    max-width: 240px;
    min-width: 120px;
    display: block;
    transition: transform 0.15s ease, filter 0.15s ease;
}

/* 下段 */
.bottom {
    display: flex;
    gap: 5vw;
}

/* nopush */
.nopush img {
    width: 14vw;
    max-width: 180px;
}

/* YouTube */
.youtube img {
    width: 20vw;
    max-width: 320px;
    min-width: 160px;
}

/* ホバーで光る（PC） */
.imgbtn:hover img {
    transform: scale(1.05);
    filter:
        brightness(1.2)
        drop-shadow(0 0 6px rgba(255,255,200,0.9))
        drop-shadow(0 0 14px rgba(255,230,120,0.9))
        drop-shadow(0 0 24px rgba(255,200,80,0.8));
}

/* 押したとき */
.imgbtn:active img,
.imgbtn.active img {
    transform: scale(0.96);
    filter:
        brightness(1.35)
        drop-shadow(0 0 10px rgba(255,255,220,1))
        drop-shadow(0 0 22px rgba(255,230,120,1))
        drop-shadow(0 0 40px rgba(255,190,60,0.95));
}

/* 動画 */
#videoOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#videoOverlay video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}

/* スマホ */
@media (max-width: 600px) {
    .imgbtn img {
        width: 32vw;
        max-width: none;
    }

    .bottom .imgbtn img {
        width: 42vw;
    }

    .nopush img {
        width: 26vw;
    }

    .youtube img {
        width: 45vw;
    }
}
</style>
</head>

<body>

<!-- 上 -->
<button class="imgbtn" onclick="location.href='kashin.html'">
    <img src="kashin.png" alt="家臣計算機">
</button>

<!-- 中 -->
<div class="bottom">
    <button class="imgbtn" onclick="location.href='kishinseki.html'">
        <img src="kishinseki.png" alt="鬼神石">
    </button>

    <button class="imgbtn" onclick="location.href='tsukumogami.html'">
        <img src="tsukumogami.png" alt="九十九">
    </button>
</div>

<!-- nopush -->
<button class="imgbtn nopush" onclick="playVideo()">
    <img src="nopush.png" alt="nopush">
</button>

<!-- YouTube -->
<a href="https://www.youtube.com/@%E3%81%9F%E3%81%84%E3%82%89%E3%81%AEzzz"
   target="_blank"
   class="imgbtn youtube">
    <img src="youtube_btn.png" alt="YouTube">
</a>

<!-- 動画 -->
<div id="videoOverlay">
    <video id="video" src="video.mp4"></video>
</div>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("videoOverlay");

function playVideo() {
    overlay.style.display = "flex";

    video.currentTime = 0;
    video.muted = false;
    video.play();

    if (video.requestFullscreen) {
        video.requestFullscreen();
    }
}

/* 動画終わったら戻る */
video.addEventListener("ended", () => {
    video.pause();
    overlay.style.display = "none";

    if (document.fullscreenElement) {
        document.exitFullscreen();
    }
});

/* スマホでも光る */
document.querySelectorAll('.imgbtn').forEach(btn => {
    btn.addEventListener('touchstart', () => {
        btn.classList.add('active');
    });

    btn.addEventListener('touchend', () => {
        setTimeout(() => {
            btn.classList.remove('active');
        }, 150);
    });
});
</script>

</body>
</html>
