<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>たいらの野望Online</title>

<style>
body {
    margin: 0;
    height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    gap: 3vh;

    background: url("bg.png") no-repeat center;
    background-size: cover;
    background-color: black;
}

/* ボタン */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
}

/* 画像（PC） */
.imgbtn img {
    width: 18vw;
    max-width: 240px;
    min-width: 120px;
    height: auto;
    display: block;
}

/* 下段 */
.bottom {
    display: flex;
    gap: 5vw;
}

/* 📱スマホ */
@media (max-width: 600px) {

    .imgbtn img {
        width: 180vw;        /* ←ちょい大きく */
        max-width: 180px;   /* ←デカすぎ防止 */
    }

    .bottom .imgbtn img {
        width: 180vw;        /* ←2つ並べてもいいサイズ */
        max-width: 180px;
    }
}
</style>
</head>

<body>

<!-- 上 -->
<button class="imgbtn" onclick="location.href='kashin.html'">
    <img src="kashin.png" alt="家臣計算機">
</button>

<!-- 下 -->
<div class="bottom">

    <button class="imgbtn" onclick="location.href='kishinseki.html'">
        <img src="kishinseki.png" alt="鬼神石">
    </button>

    <button class="imgbtn" onclick="location.href='tsukumogami.html'">
        <img src="tsukumogami.png" alt="九十九">
    </button>

</div>

</body>
</html>
