<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="EmXUONcxFN-HIXS3VmW-Kq3NfU8lShn4dwUGCAoOzfw" />

<title>たいらの野望 | 九十九ツール・鬼神石・家臣計算機まとめ | 信長の野望オンライン攻略</title>

<meta name="description" content="たいらの野望は、信長の野望オンラインの九十九ツール・鬼神石計算・家臣計算機をまとめた攻略サイトです。九十九の組み合わせや能力比較、最適構成を簡単に確認できます。">

<meta name="keywords" content="たいらの,たいらの野望,九十九,九十九ツール,鬼神石,鬼神石計算,家臣計算機,信長の野望オンライン,魔導結晶">

<style>
.sr-only{
    position:absolute !important;
    width:1px !important;
    height:1px !important;
    padding:0 !important;
    margin:-1px !important;
    overflow:hidden !important;
    clip:rect(0, 0, 0, 0) !important;
    white-space:nowrap !important;
    border:0 !important;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;     /* ←変更 */
    height: 100%;    /* ←変更 */
    overflow: auto;  /* ←変更 */
}

body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 3vh;

    background-image: url("bg.png");
    background-repeat: no-repeat;
    background-position: center top;
    background-size: 119% auto;
    background-color: black;
}

.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    -webkit-tap-highlight-color: transparent;
}

.imgbtn img {
    width: 16vw;
    max-width: 220px;
    min-width: 100px;
    display: block;
    transition: transform 0.15s ease, filter 0.15s ease;
}

.middle {
    display: flex;
    gap: 4vw;
    align-items: center;
}

.middle.tools-row {
    justify-content: center;
    flex-wrap: nowrap;
}

.nopush img {
    width: 18vw;
    max-width: 240px;
}

.youtube img {
    width: 18vw;
    max-width: 240px;
}

.imgbtn:hover img {
    transform: scale(1.05);
    filter:
        brightness(1.2)
        drop-shadow(0 0 6px rgba(255,255,200,0.9))
        drop-shadow(0 0 14px rgba(255,230,120,0.9))
        drop-shadow(0 0 24px rgba(255,200,80,0.8));
}

.imgbtn:active img,
.imgbtn.active img {
    transform: scale(0.96);
    filter:
        brightness(1.35)
        drop-shadow(0 0 10px rgba(255,255,220,1))
        drop-shadow(0 0 22px rgba(255,230,120,1))
        drop-shadow(0 0 40px rgba(255,190,60,0.95));
}

#videoOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#videoOverlay video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}

/* ★追加：左上ダウンロードボタン */
#downloadBtn{
    position: fixed;
    top: 10px;
    left: 15px;
    padding: 8px 14px;
    font-size: 14px;
    border: 2px solid #ff3b3b;
    color: #ff3b3b;
    background: rgba(0,0,0,0.6);
    cursor: pointer;
    z-index: 9999;
    display: none;
}

@media (max-width: 600px) {
    .imgbtn img {
        width: 28vw;
        max-width: none;
    }

    .middle .imgbtn img {
        width: 30vw;
    }

    .middle.tools-row {
        gap: 3vw;
        flex-wrap: wrap;
        justify-content: center;
    }

    .middle.tools-row .imgbtn img {
        width: 22vw;
    }

    .youtube img {
        width: 34vw;
    }

    .nopush img {
        width: 24vw;
    }
}
</style>
</head>

<body>

<!-- ★追加：ダウンロードボタン -->
<button id="downloadBtn">ダウンロード</button>

<h1 class="sr-only">たいらの野望｜信長の野望オンライン攻略サイト</h1>

<p class="sr-only">
たいらの野望は、信長の野望オンラインの九十九・鬼神石・家臣計算機などをまとめた攻略サイトです。
</p>

<!-- 上段 -->
<div class="middle">
    <button class="imgbtn" onclick="location.href='nouryoku.html'">
        <img src="nouryoku.png" alt="能力計算">
    </button>
    <!-- ★追加：七星転生ボタン -->
    <button class="imgbtn" onclick="location.href='shichiseitensei.html'">
        <img src="shichiseitensei.png" alt="七星転生">
    </button>
    <a href="https://www.gamecity.ne.jp/nol/index.htm" target="_blank" class="imgbtn">
        <img src="koushiki.png" alt="信長の野望オンライン公式サイト">
    </a>

    <a href="https://wiki.ohmynobu.net/nol/" target="_blank" class="imgbtn">
        <img src="wiki.png" alt="信長の野望オンライン攻略Wiki">
    </a>
</div>

<!-- 中段 -->
<div class="middle tools-row">
    <button class="imgbtn" onclick="location.href='kishinseki.html'">
        <img src="kishinseki.png" alt="鬼神石">
    </button>

    <button class="imgbtn" onclick="location.href='kashin.html'">
        <img src="kashin.png" alt="家臣計算機">
    </button>

    <button class="imgbtn" onclick="location.href='tsukumogami.html'">
        <img src="tsukumogami.png" alt="九十九">
    </button>

    <button class="imgbtn" onclick="location.href='madoukesshou.html'">
        <img src="madoukesshou.png" alt="魔導結晶">
    </button>
</div>

<!-- 下段 -->
<div class="middle">
    <button class="imgbtn nopush" onclick="location.href='counter.html'">
        <img src="counter.png" alt="カウンター">
    </button>

    <button class="imgbtn nopush" onclick="playVideo()">
        <img src="nopush.png" alt="動画再生">
    </button>

    <a href="https://www.youtube.com/@%E3%81%9F%E3%81%84%E3%82%89%E3%81%AEzzz" target="_blank" class="imgbtn youtube">
        <img src="youtube_btn.png" alt="YouTube">
    </a>
</div>

<div id="videoOverlay">
    <video id="video" src="video.mp4"></video>
</div>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("videoOverlay");

function playVideo() {
    const selectedVideo = Math.random() < 0.1 ? "video2.mp4" : "video.mp4";

    video.src = selectedVideo;
    video.controls = false;

    overlay.style.display = "flex";
    video.currentTime = 0;

    video.play();
}

video.addEventListener("ended", () => {
    video.pause();
    overlay.style.display = "none";
});

document.querySelectorAll('.imgbtn').forEach(btn => {
    btn.addEventListener('touchstart', () => {
        btn.classList.add('active');
    });

    btn.addEventListener('touchend', () => {
        setTimeout(() => {
            btn.classList.remove('active');
        }, 150);
    });
});

/* ★追加：ファイル存在チェック */
const downloadBtn = document.getElementById("downloadBtn");
const filePath = "test.xlsx";

fetch(filePath, { method: "HEAD" })
  .then(res => {
    if (res.ok) {
      downloadBtn.style.display = "block";
      downloadBtn.onclick = () => {
        window.location.href = filePath;
      };
    }
  })
  .catch(() => {});
</script>

</body>
</html>
