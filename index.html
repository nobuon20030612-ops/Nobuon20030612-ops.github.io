<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>たいらの野望Online</title>

<style>
body {
    margin: 0;
    height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 3vh;

    background: url("bg.png") no-repeat center;
    background-size: cover;
    background-color: black;
}

/* 画像ボタン */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
}

.imgbtn img {
    width: 20vw;
    min-width: 140px;
    height: auto;
    display: block;
}

/* 下段 */
.bottom {
    display: flex;
    gap: 6vw;
}

/* スマホ対応 */
@media (max-width: 600px) {

    .imgbtn img {
        width: 40vw;
    }

    .bottom {
        gap: 4vw;
    }
}
</style>
</head>

<body>

<!-- 上：家臣計算機 -->
<button class="imgbtn" onclick="location.href='kashin.html'">
    <img src="kashin.png" alt="家臣計算機">
</button>

<!-- 下：鬼神石 + 九十九 -->
<div class="bottom">

    <button class="imgbtn" onclick="location.href='kishinseki.html'">
        <img src="kishinseki.png" alt="鬼神石">
    </button>

    <button class="imgbtn" onclick="location.href='tsukumogami.html'">
        <img src="tsukumogami.png" alt="九十九">
    </button>

</div>

</body>
</html>
