<title>たいらの野望 | 九十九ツール・鬼神石・家臣計算機まとめ | 信長の野望オンライン攻略</title>

<meta name="description" content="たいらの野望は、信長の野望オンラインの九十九ツール・鬼神石計算・家臣計算機をまとめた攻略サイトです。九十九の組み合わせや能力比較、最適構成を簡単に確認できます。">

<meta name="keywords" content="たいらの,たいらの野望,九十九,九十九ツール,鬼神石,鬼神石計算,家臣計算機,信長の野望オンライン,魔導結晶">

<style>
.sr-only{
    position:absolute !important;
    width:1px !important;
    height:1px !important;
    padding:0 !important;
    margin:-1px !important;
    overflow:hidden !important;
    clip:rect(0, 0, 0, 0) !important;
    white-space:nowrap !important;
    border:0 !important;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
}

body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 3vh;

    background-image: url("bg.png");
    background-repeat: no-repeat;
    background-position: center top;
    background-size: 119% auto;
    background-color: black;
}

.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    -webkit-tap-highlight-color: transparent;
}

.imgbtn img {
    width: 16vw;
    max-width: 220px;
    min-width: 120px; /* ←ここだけ変更 */
    display: block;
    transition: transform 0.15s ease, filter 0.15s ease;
}

.middle {
    display: flex;
    gap: 4vw;
    align-items: center;
}

.middle.tools-row {
    justify-content: center;
    flex-wrap: nowrap;
}

.nopush img {
    width: 18vw;
    max-width: 240px;
}

.youtube img {
    width: 18vw;
    max-width: 240px;
}

.imgbtn:hover img {
    transform: scale(1.05);
    filter:
        brightness(1.2)
        drop-shadow(0 0 6px rgba(255,255,200,0.9))
        drop-shadow(0 0 14px rgba(255,230,120,0.9))
        drop-shadow(0 0 24px rgba(255,200,80,0.8));
}

.imgbtn:active img,
.imgbtn.active img {
    transform: scale(0.96);
    filter:
        brightness(1.35)
        drop-shadow(0 0 10px rgba(255,255,220,1))
        drop-shadow(0 0 22px rgba(255,230,120,1))
        drop-shadow(0 0 40px rgba(255,190,60,0.95));
}

#videoOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#videoOverlay video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}

#downloadBtn{
    position: fixed;
    top: 10px;
    left: 15px;
    padding: 8px 14px;
    font-size: 14px;
    border: 2px solid #ff3b3b;
    color: #ff3b3b;
    background: rgba(0,0,0,0.6);
    cursor: pointer;
    z-index: 9999;
    display: none;
}

@media (max-width: 600px) {
    body {
        justify-content: flex-start;
        padding-top: 12vh;
        gap: 4vh;

        background-size: auto 100%;
        background-position: center top;
    }

    .middle {
        gap: 3vw;
        justify-content: center;
        flex-wrap: wrap;
    }

    .imgbtn img {
        width: 26vw;
        min-width: 0;
        max-width: none;
    }

    .middle.tools-row .imgbtn img {
        width: 24vw;
    }

    .nopush img,
    .youtube img {
        width: 28vw;
    }
}
</style>
</head>
