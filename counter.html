<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>メニュー</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    overflow-y: auto;

    background: url("bg_counter.png") no-repeat center top;
    background-size: cover;
    background-color: black;
}

/* メニューボタン */
.menu-buttons {
    display: flex;
    align-items: flex-start;
    gap: 3vw;

    position: absolute;
    left: 50%;
    top: 58%;
    transform: translate(-50%, -50%);
}

.btn-group {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
}

.imgbtn img {
    width: 200px;
    transition: transform 0.15s, filter 0.15s;
}

/* 戻るボタン */
.back-fixed {
    position: fixed;
    bottom: 15px;
    right: 15px;
}

.back-fixed img {
    width: 120px;
}

/* ホバー */
.imgbtn:hover img {
    transform: scale(1.05);
    filter:
        brightness(1.2)
        drop-shadow(0 0 6px rgba(255,255,200,0.9))
        drop-shadow(0 0 14px rgba(255,230,120,0.9))
        drop-shadow(0 0 24px rgba(255,200,80,0.8));
}

/* 押下 */
.imgbtn:active img,
.imgbtn.active img {
    transform: scale(0.96);
    filter:
        brightness(1.35)
        drop-shadow(0 0 10px rgba(255,255,220,1))
        drop-shadow(0 0 22px rgba(255,230,120,1))
        drop-shadow(0 0 40px rgba(255,190,60,0.95));
}

/* スマホ対応 */
@media (max-width: 768px) {
    body {
        background-size: cover;
        padding-bottom: 90px;
    }

    .menu-buttons {
        flex-direction: column;
        gap: 18px;

        width: 80%;
        top: 52%;
    }

    .imgbtn img {
        width: 100%;
    }

    .back-fixed img {
        width: 90px;
    }
}
</style>
</head>

<body>

<div class="menu-buttons">

    <div class="btn-group">
        <button class="imgbtn" onclick="location.href='tenka_story.html'">
            <img src="tenka_story.png" alt="天下統一奇譚">
        </button>
    </div>

    <div class="btn-group">
        <button class="imgbtn" onclick="location.href='shura.html'">
            <img src="shura.png" alt="修羅の間">
        </button>
    </div>

    <div class="btn-group">
        <button class="imgbtn" onclick="location.href='tenka_taikai.html'">
            <img src="tenka_taikai.png" alt="天下武技大会">
        </button>
    </div>

</div>

<button class="imgbtn back-fixed" onclick="location.href='index.html'">
    <img src="back.png" alt="戻る">
</button>

</body>
</html>
