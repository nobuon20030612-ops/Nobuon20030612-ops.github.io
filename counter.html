<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>メニュー</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: url("bgcounter.png") no-repeat center;
    background-size: cover;
    background-color: black;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
}

/* ボタン共通 */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
}

.imgbtn img {
    width: 200px;
    transition: transform 0.15s, filter 0.15s;
}

.imgbtn:hover img {
    filter: brightness(1.2);
}

.imgbtn:active img {
    transform: scale(0.95);
}

/* ボタン列 */
.menu-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
</style>
</head>

<body>

<div class="menu-buttons">

    <button class="imgbtn" onclick="location.href='tenka_story.html'">
        <img src="tenka_story.png" alt="天下統一奇譚">
    </button>

    <button class="imgbtn" onclick="location.href='tenka_taikai.html'">
        <img src="tenka_taikai.png" alt="天下武技大会">
    </button>

    <button class="imgbtn" onclick="location.href='shura.html'">
        <img src="shura.png" alt="修羅の間">
    </button>

</div>

<!-- 戻る -->
<button class="imgbtn" onclick="location.href='index.html'">
    <img src="back.png" alt="戻る">
</button>

</body>
</html>
