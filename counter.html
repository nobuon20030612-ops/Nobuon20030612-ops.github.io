<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>メニュー</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: url("bg_counter.png") no-repeat center;
    background-size: cover;
    background-color: black;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* 横並び中央 */
.menu-buttons {
    display: flex;
    align-items: flex-start;
    gap: 3vw;
}

/* 各ボタンブロック */
.btn-group {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ボタン */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
}

.imgbtn img {
    width: 200px;
    transition: transform 0.15s, filter 0.15s;
}

/* ▼追加：修羅の下の3つ */
.sub-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

/* ▼追加：戻るボタン右下固定 */
.back-fixed {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.back-fixed img {
    width: 120px;
}

/* ホバー */
.imgbtn:hover img {
    transform: scale(1.05);
    filter:
        brightness(1.2)
        drop-shadow(0 0 6px rgba(255,255,200,0.9))
        drop-shadow(0 0 14px rgba(255,230,120,0.9))
        drop-shadow(0 0 24px rgba(255,200,80,0.8));
}

/* 押下 */
.imgbtn:active img,
.imgbtn.active img {
    transform: scale(0.96);
    filter:
        brightness(1.35)
        drop-shadow(0 0 10px rgba(255,255,220,1))
        drop-shadow(0 0 22px rgba(255,230,120,1))
        drop-shadow(0 0 40px rgba(255,190,60,0.95));
}
</style>
</head>

<body>

<div class="menu-buttons">

    <!-- 左 -->
    <div class="btn-group">
        <button class="imgbtn" onclick="location.href='tenka_story.html'">
            <img src="tenka_story.png" alt="天下統一奇譚">
        </button>
    </div>

    <!-- 真ん中（修羅＋下に3つ） -->
    <div class="btn-group">

        <button class="imgbtn" onclick="location.href='shura.html'">
            <img src="shura.png" alt="修羅の間">
        </button>

        <!-- ▼ここ追加 -->
        <div class="sub-buttons">
            <button class="imgbtn">
                <img src="btn1.png" alt="">
            </button>
            <button class="imgbtn">
                <img src="btn2.png" alt="">
            </button>
            <button class="imgbtn">
                <img src="btn3.png" alt="">
            </button>
        </div>

    </div>

    <!-- 右 -->
    <div class="btn-group">
        <button class="imgbtn" onclick="location.href='tenka_taikai.html'">
            <img src="tenka_taikai.png" alt="天下武技大会">
        </button>
    </div>

</div>

<!-- ▼ここに移動（menuの外） -->
<button class="imgbtn back-fixed" onclick="location.href='index.html'">
    <img src="back.png" alt="戻る">
</button>

</body>
</html>
