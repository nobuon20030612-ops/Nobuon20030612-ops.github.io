<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>メニュー</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: url("bg_counter.png") no-repeat center;
    background-size: cover;
    background-color: black;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* 横並び中央 */
.menu-buttons {
    display: flex;
    align-items: flex-start;
    gap: 3vw;
}

/* 各ボタンブロック */
.btn-group {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ボタン */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
}

.imgbtn img {
    width: 200px;
    transition: transform 0.15s, filter 0.15s;
}

.imgbtn:hover img {
    filter: brightness(1.2);
}

.imgbtn:active img {
    transform: scale(0.95);
}
</style>
</head>

<body>

<div class="menu-buttons">

    <!-- 左 -->
    <div class="btn-group">
        <button class="imgbtn" onclick="location.href='tenka_story.html'">
            <img src="tenka_story.png" alt="天下統一奇譚">
        </button>
    </div>

    <!-- 真ん中（修羅＋戻る） -->
    <div class="btn-group">

        <button class="imgbtn" onclick="location.href='shura.html'">
            <img src="shura.png" alt="修羅の間">
        </button>

        <!-- 戻る（ここが修羅の下） -->
        <button class="imgbtn" onclick="location.href='index.html'">
            <img src="back.png" alt="戻る">
        </button>

    </div>

    <!-- 右 -->
    <div class="btn-group">
        <button class="imgbtn" onclick="location.href='tenka_taikai.html'">
            <img src="tenka_taikai.png" alt="天下武技大会">
        </button>
    </div>

</div>

</body>
</html>
