<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>鬼神石ツール</title>

<style>
body{
  background:#000;
  color:#ccc;
  font-family:sans-serif;
}

.title{
  text-align:center;
  font-size:28px;
  margin:10px 0;
  color:#ccc;

  text-shadow:
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #333;
  padding:3px;
  text-align:center;
  font-size:11px;

  /* 👇追加ここから */
  cursor: default;
  user-select: text;
  -webkit-user-select: text;
  /* 👆ここまで */

  text-shadow:
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;
}

/* 行クリックは維持しつつドラッグも可能にする */
tr{
  user-select: none;
}

.selected{
  background:#2a2a2a;
  box-shadow: inset 0 0 6px rgba(255,255,255,0.2);
}

.sortCol{
  background:#1f2a38;
}

button{
  background:#222;
  color:#aaa;
  border:1px solid #444;
  margin:2px;
  padding:4px 6px;
  cursor:pointer;

  text-shadow:
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;
}

button.active{
  background:#444;
  color:#fff;
  box-shadow:0 0 6px rgba(255,255,255,0.4);
}

.totalRow{
  font-weight:bold;
}
</style>
</head>

<body>

<h1 class="title">鬼神石</h1>

<input type="file" id="fileInput">

<h3>第1優先</h3>
<div id="mainBtns"></div>

<h3>第2優先</h3>
<div id="subBtns"></div>

<h3>第3優先</h3>
<div id="thirdBtns"></div>

<h3>選択中（8個）</h3>
<table id="selectedTable"></table>

<h3>一覧</h3>
<table id="table"></table>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let baseData=[];
let selected=[];
let replaceTarget=null;

let mainStat=null;
let subStat=null;
let thirdStat=null;

let sortKey=null;
let sortAsc=false;

const stats=["生命","気合","腕力","耐久","器用","知力","魅力","土","水","火","風"];

const statColors={
  "生命":"#dddddd",
  "気合":"#7fbfd6",
  "腕力":"#cc6666",
  "耐久":"#5f7fbf",
  "器用":"#6fbf6f",
  "知力":"#d6d67f",
  "魅力":"#a87fd6",
  "土":"#d19a66",
  "水":"#4f6fa8",
  "火":"#b35f7a",
  "風":"#9ccc65"
};

function getVal(d,key){
  let v=d[key];
  if(typeof v==="string") v=v.replace(/[^0-9.-]/g,"");
  v=parseFloat(v);
  return isNaN(v)?0:v;
}

function getArrow(key){
  if(sortKey!==key) return "";
  return sortAsc ? " ↑" : " ↓";
}

function compare(a,b){
  const priority=[];
  if(mainStat) priority.push(mainStat);
  if(subStat) priority.push(subStat);
  if(thirdStat) priority.push(thirdStat);
  priority.push("生命");

  for(let key of priority){
    let diff=getVal(b,key)-getVal(a,key);
    if(diff!==0) return diff;
  }

  return (parseInt(a["番号"])||0)-(parseInt(b["番号"])||0);
}

function setSort(key){
  if(sortKey===key){
    sortAsc=!sortAsc;
  }else{
    sortKey=key;
    sortAsc=false;
  }
  render();
}

fileInput.onchange=e=>{
  const reader=new FileReader();
  reader.onload=ev=>{
    const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    baseData=XLSX.utils.sheet_to_json(ws);
    render();
  };
  reader.readAsArrayBuffer(e.target.files[0]);
};

function makeBtns(){
  stats.forEach(s=>{
    const c=statColors[s];
    mainBtns.innerHTML+=`<button style="color:${c}" onclick="setMain('${s}')">${s}</button>`;
    subBtns.innerHTML+=`<button style="color:${c}" onclick="setSub('${s}')">${s}</button>`;
    thirdBtns.innerHTML+=`<button style="color:${c}" onclick="setThird('${s}')">${s}</button>`;
  });
}

function updateBtnState(){
  document.querySelectorAll("#mainBtns button").forEach(b=>{
    b.classList.toggle("active",b.textContent===mainStat);
  });
  document.querySelectorAll("#subBtns button").forEach(b=>{
    b.classList.toggle("active",b.textContent===subStat);
  });
  document.querySelectorAll("#thirdBtns button").forEach(b=>{
    b.classList.toggle("active",b.textContent===thirdStat);
  });
}

function setMain(s){ mainStat=s; updateBtnState(); showTop(); }
function setSub(s){ subStat=s; updateBtnState(); showTop(); }
function setThird(s){ thirdStat=s; updateBtnState(); showTop(); }

function showTop(){
  if(baseData.length===0)return;
  const sorted=[...baseData].sort(compare);
  selected=sorted.slice(0,8).map(d=>d["番号"]);
  render();
}

function calcTotals(){
  let t={};
  stats.forEach(s=>t[s]=0);

  selected.forEach(id=>{
    const d=baseData.find(x=>x["番号"]===id);
    if(!d)return;
    stats.forEach(s=>{
      t[s]+=getVal(d,s);
    });
  });

  return t;
}

function setReplace(id){
  replaceTarget = (replaceTarget===id)?null:id;
  render();
}

function toggle(id){

  if(replaceTarget!==null){
    const idx=selected.indexOf(replaceTarget);
    if(idx!==-1){
      selected[idx]=id;
    }
    replaceTarget=null;
    render();
    return;
  }

  const i=selected.indexOf(id);

  if(i>=0){
    selected.splice(i,1);
  }else{
    if(selected.length>=8)return;
    selected.push(id);
  }

  render();
}

function render(){

  let list=[...baseData];

  if(sortKey){
    list.sort((a,b)=>{
      let av,bv;
      if(sortKey==="番号"){
        av=parseInt(a["番号"])||0;
        bv=parseInt(b["番号"])||0;
      }else{
        av=getVal(a,sortKey);
        bv=getVal(b,sortKey);
      }
      return sortAsc ? av-bv : bv-av;
    });
  }

  let head="<tr>";
  head+=`<th onclick="setSort('番号')">番号${getArrow('番号')}</th>`;
  head+="<th>鬼神の力</th><th>入手</th>";

  stats.forEach(s=>{
    head+=`<th onclick="setSort('${s}')">${s}${getArrow(s)}</th>`;
  });

  head+="</tr>";

  let html=head;

  list.forEach(d=>{
    const sel=selected.includes(d["番号"])?"selected":"";

    html+=`<tr class="${sel}" onclick="toggle(${d["番号"]})">`;
    html+=`<td>${d["番号"]}</td>`;
    html+=`<td>${d["鬼神の力"]||""}</td>`;
    html+=`<td>${d["入手"]||""}</td>`;

    stats.forEach(s=>{
      html+=`<td style="color:${statColors[s]}">${getVal(d,s)}</td>`;
    });

    html+="</tr>";
  });

  table.innerHTML=html;

  let html2=head;

  selected.forEach(id=>{
    const d=baseData.find(x=>x["番号"]===id);
    if(!d)return;

    const sel=(replaceTarget===id)?"selected":"";

    html2+=`<tr class="${sel}" onclick="setReplace(${id})">`;
    html2+=`<td>${d["番号"]}</td>`;
    html2+=`<td>${d["鬼神の力"]||""}</td>`;
    html2+=`<td>${d["入手"]||""}</td>`;

    stats.forEach(s=>{
      html2+=`<td style="color:${statColors[s]}">${getVal(d,s)}</td>`;
    });

    html2+="</tr>";
  });

  const t=calcTotals();

  html2+="<tr class='totalRow'>";
  html2+="<td colspan='3'>合計</td>";

  stats.forEach(s=>{
    html2+=`<td style="color:${statColors[s]}">${t[s]}</td>`;
  });

  html2+="</tr>";

  selectedTable.innerHTML=html2;
}

makeBtns();
updateBtnState();
</script>

</body>
</html>
