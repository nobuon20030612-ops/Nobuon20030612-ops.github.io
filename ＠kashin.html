<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>家臣計算機 完全版</title>

<!-- フォント（必須） -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">

<style>
body{
  background:#000;
  margin:0;
  font-family:"Noto Serif JP", serif;
  font-weight:900;
  color:#fff;
}

/* ===== テーブル ===== */
table{
  border-collapse:collapse;
  margin:auto;
  table-layout:fixed;
}

td,th{
  border:2px solid #000;
  width:92px;
  height:54px;
  padding:0;
  text-align:center;
  vertical-align:middle;
  line-height:1;
}

/* ===== 入力 ===== */
input{
  width:100%;
  height:100%;
  border:none;
  margin:0;
  padding:0;
  background:transparent;
  color:#000;
  font-size:32px;
  font-weight:900;
  text-align:center;
}

/* ===== 上部 ===== */
.top{
  background:#ea9999;
  color:#000;
  font-size:44px;
}

/* ===== 合計値 ===== */
.sum{
  background:#ea9999;
  color:#000;
  font-size:42px;
}

/* ===== 残 ===== */
.remain{
  background:#a6a6a6;
  color:#ff0000;
  font-size:42px;
}

/* ===== 家臣能力 ===== */
.kashin{
  background:#e67e00;
  color:#000;
  font-size:40px;
}

/* ===== ラベル ===== */
.label{
  width:180px;
  text-align:left;
  padding-left:10px;
  font-size:40px;
}

/* ===== 色ブロック ===== */
.blue{background:#5b84b1;}
.green{background:#6bbf2a;}
.yellow{background:#bfbf00;}
.pink{background:#ff99aa;}
</style>
</head>

<body>

<table>

<!-- ===== 合計 ===== -->
<tr>
<td class="label top">合計能力</td>
<td class="top">生命</td>
<td class="top">気合</td>
<td class="top">腕力</td>
<td class="top">耐久</td>
<td class="top">器用</td>
<td class="top">知力</td>
<td class="top">魅力</td>
<td class="top">土</td>
<td class="top">水</td>
<td class="top">火</td>
<td class="top">風</td>
</tr>

<tr>
<td></td>
<td class="sum" id="life">0</td>
<td class="sum" id="kiai">0</td>
<td class="sum" id="wan">0</td>
<td class="sum" id="tai">0</td>
<td class="sum" id="kiyou">0</td>
<td class="sum" id="chi">0</td>
<td class="sum" id="mir">0</td>
<td class="sum" id="do">0</td>
<td class="sum" id="sui">0</td>
<td class="sum" id="ka">0</td>
<td class="sum" id="fu">0</td>
</tr>

<!-- ===== 残 ===== -->
<tr>
<td class="label remain">残</td>
<td class="remain" id="life_remain"></td>
<td class="remain" id="kiai_remain"></td>
<td class="remain" id="wan_remain"></td>
<td class="remain" id="tai_remain"></td>
<td class="remain" id="kiyou_remain"></td>
<td class="remain" id="chi_remain"></td>
<td class="remain" id="mir_remain"></td>
<td class="remain" id="do_remain"></td>
<td class="remain" id="sui_remain"></td>
<td class="remain" id="ka_remain"></td>
<td class="remain" id="fu_remain"></td>
</tr>

</table>

<br>

<table id="grid"></table>

<script>

// ===== 列定義 =====
const cols = ["D","F","H","J","L","N","P","R","T","V","X","AD","AF","AH","AJ","AL","AN","AP","AR","AT","AV","AX"];

const map = {
life:["D","AD"],
kiai:["F","AF"],
wan:["H","AH"],
tai:["J","AJ"],
kiyou:["L","AL"],
chi:["N","AN"],
mir:["P","AP"],
do:["R","AR"],
sui:["T","AT"],
ka:["V","AV"],
fu:["X","AX"]
};

// ===== グリッド生成 =====
let html="";
for(let r=1;r<=30;r++){
  html+="<tr>";
  cols.forEach(c=>{
    html+=`<td><input id="${c+r}" oninput="calc()"></td>`;
  });
  html+="</tr>";
}
document.getElementById("grid").innerHTML=html;

// ===== 値取得 =====
function v(id){
  return Number(document.getElementById(id)?.value)||0;
}

// ===== 計算 =====
function calc(){

  function calcStat(baseCol, subCol){
    let total = v(baseCol+"7");

    for(let i=10;i<=14;i++){
      total += v(baseCol+i) + v(subCol+i);
    }
    for(let i=17;i<=29;i++){
      total += v(baseCol+i) + v(subCol+i);
    }
    return total;
  }

  const lifeVal = calcStat("D","AD");
  const kiaiVal = calcStat("F","AF");
  const wanVal = calcStat("H","AH");
  const taiVal = calcStat("J","AJ");
  const kiyouVal = calcStat("L","AL");
  const chiVal = calcStat("N","AN");
  const mirVal = calcStat("P","AP");
  const doVal = calcStat("R","AR");
  const suiVal = calcStat("T","AT");
  const kaVal = calcStat("V","AV");
  const fuVal = calcStat("X","AX");

  // 出力
  life.innerText = lifeVal;
  kiai.innerText = kiaiVal;
  wan.innerText = wanVal;
  tai.innerText = taiVal;
  kiyou.innerText = kiyouVal;
  chi.innerText = chiVal;
  mir.innerText = mirVal;
  do.innerText = doVal;
  sui.innerText = suiVal;
  ka.innerText = kaVal;
  fu.innerText = fuVal;

  // 残
  life_remain.innerText = 65535 - lifeVal;
  kiai_remain.innerText = 65535 - kiaiVal;
  wan_remain.innerText = 8000 - wanVal;
  tai_remain.innerText = 8000 - taiVal;
  kiyou_remain.innerText = 8000 - kiyouVal;
  chi_remain.innerText = 8000 - chiVal;
  mir_remain.innerText = 8000 - mirVal;
  do_remain.innerText = 8000 - doVal;
  sui_remain.innerText = 8000 - suiVal;
  ka_remain.innerText = 8000 - kaVal;
  fu_remain.innerText = 8000 - fuVal;
}

</script>

</body>
</html>
