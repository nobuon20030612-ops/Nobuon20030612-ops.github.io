let selectedTown = "";

function formatMoney(mon){
  const kan = Math.floor(mon / 1000);
  const bun = mon % 1000;
  if(kan > 0 && bun > 0) return `${kan}貫${bun}文`;
  if(kan > 0 && bun === 0) return `${kan}貫`;
  return `${bun}文`;
}

function calc(){
  const lv = Number(document.getElementById("lv").value);
  let latent = Number(document.getElementById("latent").value);
  let hour = Number(document.getElementById("hourInput").value);

  if(latent < 0) latent = 0;
  if(latent > 5) latent = 5;
  if(hour < 1) hour = 1;

  const base = Math.floor((lv * lv) / 50);
  const target = Math.floor(base * (1 - latent * 0.1));
  const oneHourValue = target * 3;

  document.getElementById("result").innerHTML =
    `LV${lv} 基礎消費価値：<b>${base}</b><br>` +
    `潜在能力【腹持ち要素】${latent}マス：${latent * 10}%減少<br>` +
    `1回消費価値：<b style="color:red;">${target}</b><br>` +
    `1時間：消費価値：<b style="color:red;">${oneHourValue}</b>`;

  const combos = makeCombos(target);

  drawCombos("cheap", [...combos].sort((a,b)=>a.cost-b.cost || a.count-b.count || countTypes(a)-countTypes(b)).slice(0,10), hour);
  drawCombos("few", [...combos].sort((a,b)=>a.count-b.count || a.cost-b.cost || countTypes(a)-countTypes(b)).slice(0,10), hour);
  drawCombos("typeFew", [...combos].sort((a,b)=>countTypes(a)-countTypes(b) || maxValue(b)-maxValue(a) || a.cost-b.cost || a.count-b.count).slice(0,10), hour);
}

function getBestFoodByValue(){
  const map = {};
  foods.forEach(f=>{
    if(f.n === "竹筒飯" || f.n === "行李飯") return;
    if(f.trade === false) return;
    if(!map[f.v] || f.p < map[f.v].p) map[f.v] = f;
  });
  return Object.values(map).sort((a,b)=>a.v-b.v);
}

function makeCombos(target){
  const calcFoods = getBestFoodByValue();
  const dp = Array.from({length:target + 1},()=>[]);
  dp[0] = [{items:[], cost:0, count:0, key:""}];

  calcFoods.forEach(food=>{
    for(let sum=food.v; sum<=target; sum++){
      dp[sum - food.v].forEach(prev=>{
        const items = prev.items.concat(food);
        dp[sum].push({
          items:items,
          cost:prev.cost + food.p,
          count:prev.count + 1,
          key:makeComboKey(items)
        });
      });
      dp[sum] = trimComboList(dp[sum]);
    }
  });

  return dp[target];
}

function makeComboKey(items){
  const count = {};
  items.forEach(f=>count[f.v] = (count[f.v] || 0) + 1);
  return Object.keys(count).sort((a,b)=>Number(a)-Number(b)).map(v=>`${v}x${count[v]}`).join("|");
}

function trimComboList(list){
  const seen = new Set();
  const merged = [];

  function addSorted(arr){
    arr.forEach(c=>{
      if(!seen.has(c.key)){
        seen.add(c.key);
        merged.push(c);
      }
    });
  }

  addSorted([...list].sort((a,b)=>a.cost-b.cost || a.count-b.count).slice(0,20));
  addSorted([...list].sort((a,b)=>a.count-b.count || a.cost-b.cost).slice(0,20));
  addSorted([...list].sort((a,b)=>countTypes(a)-countTypes(b) || maxValue(b)-maxValue(a) || a.cost-b.cost).slice(0,20));

  return merged;
}

function countTypes(combo){
  return new Set(combo.items.map(f=>f.v)).size;
}

function maxValue(combo){
  return Math.max(...combo.items.map(f=>f.v));
}

function comboRegionText(food){
  return food.region === "九州三国志" ? "" : food.region;
}

function drawCombos(id, list, hour){
  const box = document.getElementById(id);
  box.innerHTML = "";

  if(list.length === 0){
    box.innerHTML = "該当なし";
    return;
  }

  list.forEach((combo,index)=>{
    const map = {};
    combo.items.forEach(f=>{
      const key = f.v + "_" + f.n + "_" + f.town;
      if(!map[key]) map[key] = {food:f, count:0};
      map[key].count++;
    });

    let rows = "";
    Object.values(map).sort((a,b)=>b.food.v-a.food.v).forEach(x=>{
      rows += `
        <tr>
          <td>${x.food.v}</td>
          <td>${x.food.n}</td>
          <td>${comboRegionText(x.food)}</td>
          <td>${x.food.town}</td>
          <td>${x.food.price}</td>
          <td>${x.count}</td>
        </tr>
      `;
    });

    const hourCount = combo.count * hour * 3;
    const hourCost = combo.cost * hour * 3;

    box.innerHTML += `
      <div class="rank-title">${index + 1}位</div>
      <table class="result-table">
        <thead>
          <tr>
            <th>価値</th>
            <th>名称</th>
            <th>地域</th>
            <th>町</th>
            <th>値段</th>
            <th>個数</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="combo-total">
        合計：${formatMoney(combo.cost)}　個数：${combo.count}　種類：${countTypes(combo)}<br>
        ${hour}時間：${formatMoney(hourCost)}　個数：${hourCount}
      </div>
    `;
  });
}

function setupRegionFilter(){
  const select = document.getElementById("regionFilter");
  const regions = [...new Set(foods.map(f=>f.region))].sort((a,b)=>a.localeCompare(b,"ja"));
  regions.forEach(region=>{
    const option = document.createElement("option");
    option.value = region;
    option.textContent = region;
    select.appendChild(option);
  });
}

function drawFoodTable(){
  const tbody = document.getElementById("foodTable");
  const region = document.getElementById("regionFilter").value;
  const townText = document.getElementById("townFilterText");

  tbody.innerHTML = "";
  let list = foods;

  if(region) list = list.filter(f=>f.region === region);

  if(selectedTown){
    list = list.filter(f=>f.town === selectedTown);
    townText.textContent = "町絞り込み中：" + selectedTown;
  }else{
    townText.textContent = "";
  }

  list.sort((a,b)=>a.v-b.v || a.p-b.p || a.n.localeCompare(b.n,"ja")).forEach(f=>{
    tbody.innerHTML += `
      <tr>
        <td>${f.v}</td>
        <td>${f.n}</td>
        <td>${f.region}</td>
        <td><span class="town-link" data-town="${f.town}" onclick="filterByTown(this.dataset.town)">${f.town}</span></td>
        <td>${f.price}</td>
      </tr>
    `;
  });
}

function filterByTown(town){
  selectedTown = town;
  drawFoodTable();
}

function clearTownFilter(){
  selectedTown = "";
  drawFoodTable();
}

setupRegionFilter();
drawFoodTable();
</script>
