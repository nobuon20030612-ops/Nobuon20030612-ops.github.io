<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>桶狭間</title>

<style>
body {
    margin: 0;
    height: 100vh;

    /* ←ここが重要 */
    background: url("bg_okehazama.png") no-repeat center;
    background-size: contain; /* ←左右切れない */
    background-color: black;
}

/* 共通ボタン */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
}

.imgbtn img {
    width: 120px;
    transition: transform 0.15s, filter 0.15s;
}

/* 左下（TOP） */
.home-fixed {
    position: fixed;
    bottom: 20px;
    left: 20px;
}

/* 右下（戻る） */
.back-fixed {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

/* ホバー */
.imgbtn:hover img {
    transform: scale(1.05);
    filter:
        brightness(1.2)
        drop-shadow(0 0 6px rgba(255,255,200,0.9))
        drop-shadow(0 0 14px rgba(255,230,120,0.9))
        drop-shadow(0 0 24px rgba(255,200,80,0.8));
}

/* 押下 */
.imgbtn:active img {
    transform: scale(0.96);
}
</style>
</head>

<body>

<!-- TOPに戻る（左下） -->
<button class="imgbtn home-fixed" onclick="location.href='index.html'">
    <img src="kitan_top.png" alt="TOPに戻る">
</button>

<!-- 天下統一奇譚に戻る（右下） -->
<button class="imgbtn back-fixed" onclick="location.href='counter.html'">
    <img src="kitanback.png" alt="戻る">
</button>

</body>
</html>
