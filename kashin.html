<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たいらの野望Online</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 3vh;
    background: url("bg.png") no-repeat center;
    background-size: cover;
}

/* ボタン */
.imgbtn {
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
}

/* 画像 */
.imgbtn img {
    width: 18vw;
    max-width: 240px;
    min-width: 120px;
    display: block;
    transition: transform 0.15s ease, filter 0.15s ease;
}

/* 下段 */
.bottom {
    display: flex;
    gap: 5vw;
}

/* nopush */
.nopush img {
    width: 14vw;
}

/* ★ホバーで軽く光る */
.imgbtn:hover img {
    filter: brightness(1.15);
    transform: scale(1.04);
}

/* ★押したとき強く光る */
.imgbtn:active img {
    filter:
        brightness(1.35)
        drop-shadow(0 0 8px rgba(255,255,180,0.9))
        drop-shadow(0 0 18px rgba(255,230,120,0.8))
        drop-shadow(0 0 28px rgba(255,200,80,0.7));
    transform: scale(0.96);
}

/* 動画 */
#videoOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

/* 操作禁止 */
#videoOverlay video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}
</style>
</head>

<body>

<!-- 上 -->
<button class="imgbtn" onclick="location.href='kashin.html'">
    <img src="kashin.png">
</button>

<!-- 中 -->
<div class="bottom">
    <button class="imgbtn" onclick="location.href='kishinseki.html'">
        <img src="kishinseki.png">
    </button>
    <button class="imgbtn" onclick="location.href='tsukumogami.html'">
        <img src="tsukumogami.png">
    </button>
</div>

<!-- 下 -->
<button class="imgbtn nopush" onclick="playVideo()">
    <img src="nopush.png">
</button>

<!-- 動画 -->
<div id="videoOverlay">
    <video id="video" src="video.mp4"></video>
</div>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("videoOverlay");

function playVideo() {
    overlay.style.display = "flex";

    video.currentTime = 0;
    video.muted = false;
    video.play();

    if (video.requestFullscreen) {
        video.requestFullscreen();
    }
}

/* 自動で戻る */
video.addEventListener("ended", () => {
    video.pause();
    overlay.style.display = "none";

    if (document.fullscreenElement) {
        document.exitFullscreen();
    }
});
</script>

</body>
</html>
