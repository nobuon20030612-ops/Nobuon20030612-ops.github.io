<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>家臣計算機</title>

<style>
.top-back{
  position: fixed;
  top: 12px;
  right: 20px;

  padding: 10px 20px;
  font-size: 20px;

  border: 2px solid #ff3b3b;
  color: #ff3b3b;
  background: rgba(0,0,0,0.6);

  cursor: pointer;
  transition: all 0.2s;
}
.top-back:hover{
  color: #fff;
  border-color: #ff0000;

  box-shadow:
    0 0 8px rgba(255,80,80,0.9),
    0 0 20px rgba(255,0,0,0.9),
    0 0 40px rgba(255,0,0,0.8);

  transform: scale(1.05);
}  
  html, body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:"MS Gothic", sans-serif;
}

body{ background:#000; }

.table{
  display:grid;
  grid-template-columns:80px repeat(11, 49px);
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.06) 0px,
      rgba(255,255,255,0.06) 26px,
      transparent 26px,
      transparent 52px
    );
}

.cell{
  border:1px solid #111;
  height:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
}

.label{
  justify-content:flex-end;
  padding-right:6px;
  border:none;
  position:relative;
  background:#000 !important;
}

.shift-row{ position:relative; top:26px; z-index:1; }

.nine-inline{
  position:absolute;
  left:4px;
  font-size:11px;
}

.top-h{ background:#e8a0a0; color:#000; }
.top-v{ background:#333; color:#ff4444; }

.sub-h{ background:#ff8800; color:#000; }

.input{
  width:100%;
  height:100%;
  background:transparent;
  color:inherit;
  border:none;
  text-align:center;
}

.head  .cell{ background:#5c7fb8; }
.body  .cell{ background:#3f9b3f; }
.right .cell{ background:#b5b300; }
.left  .cell{ background:#c03a6b; }

.head .label,
.body .label,
.right .label,
.left .label{
  background:#000 !important;
}

.section{ margin-top:16px; }
.flex{ display:flex; gap:16px; }

/* ★選択中セルを常時発光 */
/* 通常ホバー：全セル */
.cell:hover{
  filter: brightness(1.25);
  box-shadow:
    inset 0 0 8px rgba(255,255,200,0.7),
    0 0 12px rgba(255,230,120,0.7);
}


/* 空セルだけホバーで光る */
.cell:hover:not(.label):not(.filled){
  filter: brightness(1.2);
  box-shadow:
    inset 0 0 8px rgba(255,255,200,0.6),
    0 0 12px rgba(255,230,120,0.6);
}

/* 選択中セルは常時光る */
.cell.active{
  background:#444 !important;
  box-shadow:
    inset 0 0 10px rgba(255,230,120,0.8),
    0 0 10px rgba(255,230,120,0.7);
}

/* 選択中セルにホバーしたらさらに光る */
.cell.active:hover{
  filter: brightness(1.4);
  box-shadow:
    inset 0 0 14px rgba(255,255,200,1),
    0 0 16px rgba(255,230,120,0.9),
    0 0 28px rgba(255,200,80,0.8);
}

/* 入力済みセルは光らない */
.cell.filled{
  box-shadow:none !important;
  filter:none !important;
}  
</style>
</head>

<body>
<div class="top-back" onclick="location.href='index.html'">
  戻る
</div>
<!-- 合計能力 -->
<div class="table">
  <div class="cell label shift-row">合計能力</div>
  <div class="cell top-h">生命</div><div class="cell top-h">気合</div><div class="cell top-h">腕力</div>
  <div class="cell top-h">耐久</div><div class="cell top-h">器用</div><div class="cell top-h">知力</div>
  <div class="cell top-h">魅力</div><div class="cell top-h">土</div><div class="cell top-h">水</div>
  <div class="cell top-h">火</div><div class="cell top-h">風</div>

  <div class="cell label"></div>
  <div class="cell top-h total-0">0</div>
  <div class="cell top-h total-1">0</div>
  <div class="cell top-h total-2">0</div>
  <div class="cell top-h total-3">0</div>
  <div class="cell top-h total-4">0</div>
  <div class="cell top-h total-5">0</div>
  <div class="cell top-h total-6">0</div>
  <div class="cell top-h total-7">0</div>
  <div class="cell top-h total-8">0</div>
  <div class="cell top-h total-9">0</div>
  <div class="cell top-h total-10">0</div>

  <div class="cell label">残</div>
  <div class="cell top-v remain-0">65535</div>
  <div class="cell top-v remain-1">65535</div>
  <div class="cell top-v remain-2">8000</div>
  <div class="cell top-v remain-3">8000</div>
  <div class="cell top-v remain-4">8000</div>
  <div class="cell top-v remain-5">8000</div>
  <div class="cell top-v remain-6">8000</div>
  <div class="cell top-v remain-7">8000</div>
  <div class="cell top-v remain-8">8000</div>
  <div class="cell top-v remain-9">8000</div>
  <div class="cell top-v remain-10">8000</div>
</div>

<!-- 家臣能力 -->
<div class="table section">
  <div class="cell label shift-row">家臣能力</div>

  <div class="cell sub-h">生命</div><div class="cell sub-h">気合</div><div class="cell sub-h">腕力</div>
  <div class="cell sub-h">耐久</div><div class="cell sub-h">器用</div><div class="cell sub-h">知力</div>
  <div class="cell sub-h">魅力</div><div class="cell sub-h">土</div><div class="cell sub-h">水</div>
  <div class="cell sub-h">火</div><div class="cell sub-h">風</div>

  <div class="cell label"></div>
  <script>
    for(let i=0;i<11;i++){
      document.write('<div class="cell"><input class="input col-'+i+'"></div>');
    }

// セルクリックで選択ON/OFF
document.querySelectorAll(".cell").forEach(cell=>{
  cell.addEventListener("click", ()=>{
    cell.classList.toggle("active");
  });
});
    
  </script>
</div>

<script>
const baseRows = ["付与石1","付与石2","神器石1","神器石2"];
const powerRows = ["1","2","3","4","5","6","7","8"];
const ninetyNine = ["","","","九","十","九","",""];

function createSection(title, cls, has99=false){
  document.write(`<div class="table ${cls}">`);

  document.write(`<div class="cell label"></div>`);
  ["生命","気合","腕力","耐久","器用","知力","魅力","土","水","火","風"]
    .forEach(t => document.write(`<div class="cell">${t}</div>`));

  document.write(`<div class="cell label">${title}付与</div>`);

  for(let i=0;i<11;i++){
    document.write('<div class="cell"><input class="input col-'+i+'"></div>');
  }

  baseRows.forEach(r=>{
    document.write(`<div class="cell label">${r}</div>`);
    for(let j=0;j<11;j++){
      document.write('<div class="cell"><input class="input col-'+j+'"></div>');
    }
  });

  if(has99){
    powerRows.forEach((r,i)=>{
      let extra = ninetyNine[i] ? `<span class="nine-inline">${ninetyNine[i]}</span>` : "";
      document.write(`<div class="cell label">${extra}${r}</div>`);
      for(let j=0;j<11;j++){
        document.write('<div class="cell"><input class="input col-'+j+'"></div>');
      }
    });
  }

  document.write(`</div>`);
}
</script>

<div class="flex section">
<script>
createSection("頭：","head", false);
createSection("胴：","body", false);
</script>
</div>

<div class="flex section">
<script>
createSection("右手：","right", true);
createSection("左手：","left", true);
</script>
</div>

<script>
// 全角→半角変換
function toHalfWidth(str){
  return str
    .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
    .replace(/[－ー]/g, "-");
}

function calc(){
  for(let i=0;i<11;i++){
    let sum = 0;

    document.querySelectorAll(".col-"+i).forEach(el=>{
      const val = toHalfWidth(el.value);
      sum += Number(val) || 0;
    });

    document.querySelector(".total-"+i).textContent = sum;

    const max = (i === 0 || i === 1) ? 65535 : 8000;
    document.querySelector(".remain-"+i).textContent = max - sum;
  }
}

// 入力時に自動変換
document.querySelectorAll(".cell").forEach(cell=>{
  cell.addEventListener("click", (e)=>{

    // ラベルは対象外
    if(cell.classList.contains("label")) return;

    const input = cell.querySelector("input");

    // ★値が入ってたら選択不可
    if(input && input.value.trim() !== "") return;

    // 他の選択を全部解除
    document.querySelectorAll(".cell.active").forEach(c=>{
      c.classList.remove("active");
    });

    // 今のセルだけ光る
    cell.classList.add("active");
  });
});

calc();
</script>

</body>
</html>
